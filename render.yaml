services:
  - type: web
    name: legal-time-tracker
    runtime: python
    plan: free
    buildCommand: |
      cd frontend && npm install && npx vite build && cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
